<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradients -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="40%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#0f1f2e"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162038"/>
      <stop offset="100%" stop-color="#0c1525"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1821"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="circuit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="circuit2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Aurora / ambient glow -->
  <ellipse cx="400" cy="200" rx="500" ry="300" fill="url(#glow1)" filter="url(#blur-lg)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 60,-20; -30,10; 0,0" dur="25s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1200" cy="150" rx="400" ry="250" fill="url(#glow2)" filter="url(#blur-lg)">
    <animateTransform attributeName="transform" type="translate" values="0,0; -40,15; 50,-10; 0,0" dur="30s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="800" cy="350" rx="300" ry="200" fill="#8b5cf6" opacity="0.06" filter="url(#blur-lg)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 30,20; -20,-15; 0,0" dur="20s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Stars -->
  <g fill="#fff" opacity="0.7">
    <circle cx="120" cy="80" r="1"/><circle cx="350" cy="45" r="0.8"/>
    <circle cx="520" cy="120" r="1.2"/><circle cx="680" cy="35" r="0.6"/>
    <circle cx="890" cy="90" r="1"/><circle cx="1050" cy="55" r="0.8"/>
    <circle cx="1200" cy="110" r="1.1"/><circle cx="1380" cy="40" r="0.7"/>
    <circle cx="1500" cy="95" r="0.9"/><circle cx="200" cy="150" r="0.5"/>
    <circle cx="450" cy="180" r="0.7"/><circle cx="750" cy="160" r="0.6"/>
    <circle cx="980" cy="145" r="0.8"/><circle cx="1100" cy="175" r="0.5"/>
    <circle cx="1300" cy="130" r="0.9"/><circle cx="80" cy="200" r="0.6"/>
    <circle cx="600" cy="70" r="0.4"/><circle cx="1450" cy="160" r="0.5"/>
  </g>
  <!-- Twinkling stars -->
  <g fill="#fff">
    <circle cx="300" cy="100" r="1.2" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="60" r="1" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1350" cy="85" r="1.3" opacity="0.25">
      <animate attributeName="opacity" values="0.25;0.75;0.25" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="140" r="0.8" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Far mountains (layer 1) — brighter -->
  <path d="M0 500 L150 380 L300 430 L500 340 L650 400 L800 320 L950 390 L1100 350 L1250 410 L1400 360 L1600 420 L1600 900 L0 900Z" fill="#1e3455" opacity="0.9"/>

  <!-- Mid mountains (layer 2) — brighter -->
  <path d="M0 550 L100 480 L250 520 L400 450 L550 500 L700 430 L850 490 L1000 440 L1150 500 L1300 460 L1450 510 L1600 470 L1600 900 L0 900Z" fill="#172a45" opacity="0.95"/>

  <!-- Mountain edge glow -->
  <path d="M0 550 L100 480 L250 520 L400 450 L550 500 L700 430 L850 490 L1000 440 L1150 500 L1300 460 L1450 510 L1600 470" fill="none" stroke="#10b981" stroke-width="1" opacity="0.2"/>

  <!-- Circuit board traces on mountains -->
  <g stroke-width="1.5" fill="none" opacity="0.7">
    <!-- Horizontal traces -->
    <line x1="100" y1="580" x2="500" y2="580" stroke="url(#circuit)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="560" x2="1000" y2="560" stroke="url(#circuit2)">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="1050" y1="590" x2="1500" y2="590" stroke="url(#circuit)">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite"/>
    </line>

    <!-- Vertical connectors -->
    <line x1="500" y1="580" x2="500" y2="620" stroke="#10b981" opacity="0.3"/>
    <line x1="1000" y1="560" x2="1000" y2="600" stroke="#3b82f6" opacity="0.2"/>
    <line x1="250" y1="580" x2="250" y2="640" stroke="#10b981" opacity="0.2"/>
    <line x1="1300" y1="590" x2="1300" y2="650" stroke="#10b981" opacity="0.25"/>

    <!-- Junction nodes -->
    <circle cx="500" cy="580" r="3" fill="#10b981" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="560" r="3" fill="#3b82f6" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="580" r="2" fill="#10b981" opacity="0.3"/>
    <circle cx="750" cy="560" r="2" fill="#3b82f6" opacity="0.3"/>
    <circle cx="1300" cy="590" r="2.5" fill="#10b981" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Ground / foreground -->
  <path d="M0 650 L200 620 L400 640 L600 610 L800 635 L1000 615 L1200 640 L1400 625 L1600 645 L1600 900 L0 900Z" fill="url(#ground)"/>

  <!-- Foreground circuit traces -->
  <g stroke-width="1.5" fill="none">
    <path d="M0 700 L200 700 L220 680 L400 680" stroke="#10b981" opacity="0.15">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M500 720 L700 720 L720 700 L900 700 L920 720 L1100 720" stroke="#3b82f6" opacity="0.1">
      <animate attributeName="opacity" values="0.05;0.2;0.05" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M1200 690 L1350 690 L1370 710 L1600 710" stroke="#10b981" opacity="0.12">
      <animate attributeName="opacity" values="0.08;0.25;0.08" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Data flow particles (moving dots along traces) -->
  <circle r="2" fill="#10b981" opacity="0.8" filter="url(#blur-sm)">
    <animateMotion path="M100,580 L500,580 L500,620" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#3b82f6" opacity="0.7" filter="url(#blur-sm)">
    <animateMotion path="M600,560 L1000,560 L1000,600" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#10b981" opacity="0.6" filter="url(#blur-sm)">
    <animateMotion path="M1050,590 L1500,590 L1500,590" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#8b5cf6" opacity="0.5" filter="url(#blur-sm)">
    <animateMotion path="M0,700 L200,700 L220,680 L400,680" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle grid overlay -->
  <g stroke="#10b981" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="650" x2="1600" y2="650"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="200" y1="500" x2="200" y2="900"/>
    <line x1="400" y1="500" x2="400" y2="900"/>
    <line x1="600" y1="500" x2="600" y2="900"/>
    <line x1="800" y1="500" x2="800" y2="900"/>
    <line x1="1000" y1="500" x2="1000" y2="900"/>
    <line x1="1200" y1="500" x2="1200" y2="900"/>
    <line x1="1400" y1="500" x2="1400" y2="900"/>
  </g>
</svg>
